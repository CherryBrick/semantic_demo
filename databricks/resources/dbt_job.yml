resources:
  jobs:
    semantic_demo_dbt:
      name: semantic_demo_dbt

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: "PAUSED"

      git_source:
        git_url: https://github.com/CherryBrick/semantic_demo.git
        git_provider: gitHub
        git_branch: main

      tasks:
        - task_key: bronze
          dbt:
            commands:
              - "dbt deps"
              - "dbt run --select bronze"
            project_directory: "dbt"
            warehouse_id: "0da6b39805021aaa"

        - task_key: staging
          depends_on:
            - task_key: bronze
          dbt:
            commands:
              - "dbt deps"
              - "dbt run --select staging"
            project_directory: "dbt"
            warehouse_id: "0da6b39805021aaa"
