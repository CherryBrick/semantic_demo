services:
 # ===== Cube Semantic Layer =====
  cube:
    build: cube/
    env_file: .env
    ports:
      - "4000:4000"
      - "15432:15432"
    volumes:
      - ./cube:/cube/conf
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/cubejs-api/v1/meta', r => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

